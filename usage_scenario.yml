---
# BEAM HTTP — single-load template (GMT placeholders).
#
# Hosted request form (metrics.green-coding.io/request.html): the UI wraps keys as
# __GMT_VAR_<key>__. Enter ONLY the middle part in the form:
#   Key BEAM_IMAGE    → __GMT_VAR_BEAM_IMAGE__
#   Key NUM_REQUESTS  → __GMT_VAR_NUM_REQUESTS__
# Do not type the full __GMT_VAR_...__ into the key field.
#
# Local runner.py: use --variable "__GMT_VAR_BEAM_IMAGE__=..." etc. (full names).
#
# Pin without variables: see usage_scenario.<image>.n80000.yml in the repo root.
name: BEAM HTTP (single-load variable template)
author: beam-gmt-benchmarks
description: >
  One measured web server container from the BEAM benchmark suite naming scheme,
  plus a load-generator container. Load matches BEAM-web-server-benchmarks semantics:
  configurable health wait (env) then parallel HTTP GETs via tools/gmt_http_load.py.
  Server must listen on port 80 (same as BEAM Dockerfiles).

services:
  beam-server:
    image: __GMT_VAR_BEAM_IMAGE__

  loadgen:
    image: alpine:3.19
    folder-destination: /tmp/repo
    depends_on:
      - beam-server
    setup-commands:
      - command: apk add --no-cache python3 py3-requests

flow:
  - name: HTTP workload
    container: loadgen
    commands:
      - type: console
        shell: sh
        command: python3 /tmp/repo/tools/gmt_http_load.py --url http://beam-server:80/ --num_requests __GMT_VAR_NUM_REQUESTS__
