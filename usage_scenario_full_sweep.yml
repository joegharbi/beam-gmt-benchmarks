---
# BEAM HTTP — full sweep in one GMT measurement (chained loads).
#
# Hosted form keys (middle part only): BEAM_IMAGE, SWEEP_EXTRA
#   SWEEP_EXTRA: leave empty for default 13-point list; or e.g. --counts 100,80000
#
# Local: --variable "__GMT_VAR_BEAM_IMAGE__=..." --variable "__GMT_VAR_SWEEP_EXTRA__="
#
# Not equivalent to 13 separate GMT runs (thermal/state carry-over). See docs/HTTP_SWEEP.md.
name: BEAM static HTTP (full sweep in one measurement)
author: beam-gmt-benchmarks
description: >
  Same layout as the default scenario, but the load step runs BEAM HTTP load sizes in one flow command
  (default: full 13-point list; optional __GMT_VAR_SWEEP_EXTRA__ e.g. --counts 100,1000).
  Produces one stats.html run with one Runtime phase containing back-to-back load bursts;
  compare carefully to per-load runs for thermal and isolation.

services:
  beam-server:
    image: __GMT_VAR_BEAM_IMAGE__

  loadgen:
    image: alpine:3.19
    folder-destination: /tmp/repo
    depends_on:
      - beam-server
    setup-commands:
      - command: apk add --no-cache python3 py3-requests

flow:
  - name: HTTP workload (sequential loads in one measurement)
    container: loadgen
    commands:
      - type: console
        shell: sh
        command: python3 /tmp/repo/tools/gmt_http_load.py --url http://beam-server:80/ --sweep __GMT_VAR_SWEEP_EXTRA__
